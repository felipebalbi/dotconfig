# Catppuccin Mocha for Rio
# Palette: https://github.com/catppuccin/catppuccin
[colors]
background        = "#1E1E2E"
foreground        = "#CDD6F4"

cursor            = "#F5E0DC"
vi-cursor         = "#B4BEFE"

# Selection
selection-background = "#585B70"
selection-foreground = "#CDD6F4"

# Navigation / UI
tabs              = "#6C7086"
tabs-active       = "#CDD6F4"
bar               = "#181825"
split             = "#313244"

# Search
search-match-background         = "#A6ADC8"
search-match-foreground         = "#1E1E2E"
search-focused-match-background = "#FAB387"
search-focused-match-foreground = "#1E1E2E"

# Regular colors
black             = "#45475A"
red               = "#F38BA8"
green             = "#A6E3A1"
yellow            = "#F9E2AF"
blue              = "#89B4FA"
magenta           = "#F5C2E7"
cyan              = "#94E2D5"
white             = "#BAC2DE"

# Bright / light colors
light-black       = "#585B70"
light-red         = "#F38BA8"
light-green       = "#A6E3A1"
light-yellow      = "#F9E2AF"
light-blue        = "#89B4FA"
light-magenta     = "#F5C2E7"
light-cyan        = "#94E2D5"
light-white       = "#A6ADC8"

# Dim colors
dim-black         = "#45475A"
dim-red           = "#F38BA8"
dim-green         = "#A6E3A1"
dim-yellow        = "#F9E2AF"
dim-blue          = "#89B4FA"
dim-magenta       = "#F5C2E7"
dim-cyan          = "#94E2D5"
dim-white         = "#BAC2DE"
